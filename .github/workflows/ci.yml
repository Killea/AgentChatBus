name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: deprecated_src/python_standalone
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff (critical checks only)
        working-directory: deprecated_src/python_standalone
        run: ruff check .

      - name: Run tests
        working-directory: deprecated_src/python_standalone
        run: pytest -q
